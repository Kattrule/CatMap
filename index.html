<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellit Glob Pro - V11</title>
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        :root {
            --indigo: #7582ff;
            --purple: #bd93f9;
            --cyan: #8be9fd;
            --yellow: #f1fa8c;
            --bg-glass: rgba(15, 15, 30, 0.95);
            --arrow-scale: 1; /* Denna ändras av JavaScriptet nedan */
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100%; width: 100%; position: absolute; }

        /* SÖKRUTA */
        #search-container { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 3000; }
        #search-input {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 1px solid var(--indigo); background: var(--bg-glass);
            color: white; font-size: 1rem; outline: none; backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* KOORDINATRUTAN (FIXAD) */
        .coord-box { text-align: center; padding: 5px; }
        .coord-label { color: var(--yellow); font-size: 0.7rem; display: block; margin-bottom: 2px; }
        .coord-values { color: var(--cyan); font-family: monospace; font-size: 0.85rem; }

        /* SVÄNG-PILAR SOM SKALAS */
        .turn-arrow-icon {
            width: 24px; height: 24px;
            display: flex; justify-content: center; align-items: center;
            transform: scale(var(--arrow-scale)); /* HÄR SKER MAGIN */
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
            pointer-events: none;
            transition: transform 0.1s linear;
        }

        .maplibregl-popup-content {
            background: var(--bg-glass) !important; color: white;
            border: 1px solid var(--indigo); border-radius: 10px !important;
        }

        .nav-btn {
            margin-top: 10px; width: 100%; background: var(--indigo);
            color: white; border: none; padding: 10px; border-radius: 6px;
            font-weight: bold; cursor: pointer;
        }

        .map-tools { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .tool-btn {
            width: 60px; height: 60px; background: var(--bg-glass);
            border: 2px solid var(--indigo); border-radius: 50%; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Sök plats..." autocomplete="off">
    </div>

    <div id="map"></div>
    <div class="map-tools"><div class="tool-btn" id="lockBtn" onclick="toggleLock()">🔒</div></div>

    <script>
        let followUser = true, userMarker = null, userCoords = null;
        let pinMarkers = [], turnMarkers = [], pressTimer = null, isMoving = false;

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: { 's-tiles': { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'], tileSize: 256 } },
                layers: [{ id: 's-layer', type: 'raster', source: 's-tiles' }]
            },
            center: [15.0, 62.0], zoom: 4, projection: 'globe'
        });

        // --- FUNKTION FÖR ATT SKALA PILARNA ---
        map.on('zoom', () => {
            const z = map.getZoom();
            // Om zoom är 15 (nära) är skalan 1.0. Om zoom är 5 (långt ut) är skalan 0.2.
            const scale = Math.max(0.1, Math.min(1.5, (z - 5) / 10));
            document.documentElement.style.setProperty('--arrow-scale', scale);
        });

        async function getDirections(dest) {
            if (!userCoords) return;
            const url = `https://router.project-osrm.org/route/v1/driving/${userCoords[0]},${userCoords[1]};${dest[0]},${dest[1]}?overview=full&geometries=geojson&steps=true`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const route = data.routes[0];

                turnMarkers.forEach(m => m.remove()); turnMarkers = [];

                if (map.getSource('route')) { map.getSource('route').setData(route.geometry); } 
                else {
                    map.addSource('route', { type: 'geojson', data: route.geometry });
                    map.addLayer({ id: 'route-casing', type: 'line', source: 'route', paint: { 'line-color': '#2c2c3e', 'line-width': ['interpolate', ['linear'], ['zoom'], 5, 2, 15, 10] } });
                    map.addLayer({ id: 'route', type: 'line', source: 'route', paint: { 'line-color': '#7582ff', 'line-width': ['interpolate', ['linear'], ['zoom'], 5, 1, 15, 6] } });
                }

                route.legs[0].steps.forEach((step, i, steps) => {
                    if (i < steps.length - 1) {
                        const el = document.createElement('div'); el.className = 'turn-arrow-icon';
                        const bearing = getBearing(step.maneuver.location, steps[i+1].maneuver.location);
                        el.innerHTML = `<svg width="24" height="24" viewBox="0 0 100 100" style="transform: rotate(${bearing}deg)"><path d="M50 5 L90 80 L50 60 L10 80 Z" fill="#8be9fd" stroke="#fff" stroke-width="6"/></svg>`;
                        const m = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(step.maneuver.location).addTo(map);
                        turnMarkers.push(m);
                    }
                });
            } catch (e) {}
        }

        function placePin(lngLat) {
            pinMarkers.forEach(p => p.remove()); pinMarkers = [];
            const html = `
                <div class="coord-box">
                    <span class="coord-label">DESTINATION</span>
                    <div class="coord-values">${lngLat.lat.toFixed(5)}, ${lngLat.lng.toFixed(5)}</div>
                    <button class="nav-btn" onclick="getDirections([${lngLat.lng}, ${lngLat.lat}])">STARTA NAVIGERING</button>
                </div>`;
            const popup = new maplibregl.Popup({ offset: 25 }).setHTML(html);
            const m = new maplibregl.Marker({ color: "#ff5555" }).setLngLat(lngLat).setPopup(popup).addTo(map);
            m.togglePopup(); pinMarkers.push(m);
        }

        function getBearing(s, e) {
            const y = Math.sin((e[0]-s[0])*Math.PI/180) * Math.cos(e[1]*Math.PI/180);
            const x = Math.cos(s[1]*Math.PI/180)*Math.sin(e[1]*Math.PI/180) - Math.sin(s[1]*Math.PI/180)*Math.cos(e[1]*Math.PI/180)*Math.cos((e[0]-s[0])*Math.PI/180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // --- POSITION ---
        const v11Pos = document.createElement('div');
        v11Pos.innerHTML = `<div style="width:28px;height:28px;display:flex;justify-content:center;align-items:center;" id="me"><svg width="28" height="28" viewBox="0 0 100 100"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="#4b0082" stroke-width="8"/></svg></div>`;

        function updatePos(pos) {
            userCoords = [pos.coords.longitude, pos.coords.latitude];
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: v11Pos, anchor: 'center' }).setLngLat(userCoords).addTo(map);
                map.setZoom(15);
            } else { userMarker.setLngLat(userCoords); }
            document.getElementById('me').style.transform = `rotate(${pos.coords.heading || 0}deg)`;
            if (followUser) map.easeTo({ center: userCoords });
        }

        function toggleLock() { followUser = !followUser; document.getElementById('lockBtn').innerText = followUser ? "🔒" : "🔓"; }
        navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        
        map.on('mousedown', (e) => { pressTimer = setTimeout(() => placePin(e.lngLat), 800); });
        map.on('mouseup', () => clearTimeout(pressTimer));
        map.on('touchstart', (e) => { if(!e.touches[1]) pressTimer = setTimeout(() => placePin(map.unproject(e.point)), 800); });
        map.on('touchend', () => clearTimeout(pressTimer));
        map.on('dblclick', () => {
            pinMarkers.forEach(p => p.remove()); turnMarkers.forEach(m => m.remove());
            if (map.getSource('route')) { map.removeLayer('route'); map.removeLayer('route-casing'); map.removeSource('route'); }
        });
    </script>
</body>
</html>
