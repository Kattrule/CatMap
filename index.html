<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CatMap</title>
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        :root {
            --indigo: #7582ff;
            --bg-glass: rgba(15, 15, 30, 0.95);
            --cyan: #8be9fd;
            --yellow: #f1fa8c;
            --red: #ff5555;
            --green: #50fa7b;
            --purple: #bd93f9;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #map { height: 100%; width: 100%; position: absolute; }

        /* SÖKFÄLT */
        #search-container { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 3000; }
        #search-input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--indigo);
            background: var(--bg-glass); color: white; backdrop-filter: blur(10px); box-sizing: border-box; outline: none;
        }

        /* NAV-PANEL */
        #nav-panel {
            position: absolute; top: 65px; left: 10px; right: 10px; z-index: 2500;
            background: var(--bg-glass); border: 1px solid var(--cyan);
            border-radius: 10px; padding: 15px; display: none; backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #instruction-text { font-size: 1.1rem; font-weight: bold; color: #fff; display: block; margin-bottom: 5px; }
        #turn-dist { font-size: 0.9rem; color: var(--yellow); font-family: monospace; }

        /* STOPP-LISTA */
        #stop-list-container {
            position: absolute; bottom: 100px; left: 10px; width: 280px;
            max-height: 45vh; display: flex; flex-direction: column; z-index: 2000;
            background: var(--bg-glass); border: 1px solid var(--indigo);
            border-radius: 15px; padding: 12px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #stop-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; }
        
        .stop-item {
            display: flex; align-items: center; background: rgba(255,255,255,0.08);
            margin-bottom: 6px; padding: 8px; border-radius: 8px; font-size: 0.85rem;
        }
        .stop-name { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* KNAPPAR */
        .btn-group { display: flex; gap: 8px; }
        .nav-btn-main { flex: 2; background: var(--green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .clear-btn-small { flex: 1; background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .stop-btn { background: none; border: none; color: white; cursor: pointer; padding: 0 5px; font-size: 1.1rem; opacity: 0.7; }
        .stop-btn:hover { opacity: 1; }
        
        /* DÖLJ-KNAPP */
        #hide-btn { background: var(--indigo); color: white; border: none; border-radius: 5px; padding: 2px 8px; cursor: pointer; font-size: 0.8rem; }

        .map-tools { position: absolute; bottom: 25px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .tool-btn { width: 55px; height: 55px; background: var(--bg-glass); border: 2px solid var(--indigo); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; cursor: pointer; }
        .voice-indicator { float: right; font-size: 1.5rem; cursor: pointer; padding: 5px; }

        /* När listan är gömd */
        .minimized { height: 40px !important; overflow: hidden !important; width: 120px !important; }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Håll inne på kartan för att lägga till..." autocomplete="off">
    </div>

    <div id="nav-panel">
        <div class="voice-indicator" onclick="repeatInstruction()">🔊</div>
        <div id="instruction-box">
            <span id="instruction-text">Väntar på rutt...</span>
            <span id="turn-dist">---</span>
        </div>
        <div style="margin-top:15px;">
            <button onclick="stopNavigation()" style="background:var(--red); border:none; color:white; padding:12px; border-radius:8px; font-size:0.8rem; font-weight:bold; width:100%;">AVBRYT NAVIGERING</button>
        </div>
    </div>

    <div id="stop-list-container">
        <div class="list-header">
            <span style="font-size:0.7rem; color:var(--cyan); font-weight:bold; letter-spacing:1px;">RUTT</span>
            <button id="hide-btn" onclick="toggleList()">DÖLJ ^</button>
        </div>
        <div id="stop-list"></div>
        <div class="btn-group">
            <button class="nav-btn-main" onclick="startNavigation()">STARTA</button>
            <button class="clear-btn-small" onclick="clearAll()">TÖM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="map-tools">
        <div class="tool-btn" id="lockBtn" onclick="toggleLock()">🔒</div>
    </div>

    <script>
        let followUser = true, userMarker = null, userCoords = null;
        let stops = [], isMapMoving = false, pressTimer;
        let isNavigating = false, routeSteps = [], currentStepIndex = 0, lastSpokenDistance = Infinity;

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: { 's-tiles': { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'], tileSize: 256 } },
                layers: [{ id: 's-layer', type: 'raster', source: 's-tiles' }]
            },
            center: [15.0, 62.0], zoom: 4
        });

        // --- RÖST ---
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'sv-SE';
            window.speechSynthesis.speak(msg);
        }

        function repeatInstruction() {
            if (routeSteps[currentStepIndex]) speak(routeSteps[currentStepIndex].maneuver.instruction);
        }

        // --- UI LOGIK ---
        function toggleList() {
            const el = document.getElementById('stop-list-container');
            const btn = document.getElementById('hide-btn');
            el.classList.toggle('minimized');
            btn.innerText = el.classList.contains('minimized') ? "VISA v" : "DÖLJ ^";
        }

        function renameStop(id) {
            const stop = stops.find(s => s.id === id);
            const newName = prompt("Nytt namn på stopp:", stop.name);
            if (newName) { stop.name = newName; updateUI(); }
        }

        function removeStop(id) {
            const idx = stops.findIndex(s => s.id === id);
            if (idx > -1) { stops[idx].marker.remove(); stops.splice(idx, 1); updateUI(); }
        }

        function updateUI() {
            const list = document.getElementById('stop-list');
            const container = document.getElementById('stop-list-container');
            list.innerHTML = '';
            
            if (stops.length > 0 && !isNavigating) {
                container.style.display = 'flex';
                stops.forEach((s, i) => {
                    const item = document.createElement('div');
                    item.className = 'stop-item';
                    item.innerHTML = `
                        <span class="stop-name">${i+1}. ${s.name}</span>
                        <button class="stop-btn" onclick="renameStop(${s.id})">✏️</button>
                        <button class="stop-btn" onclick="removeStop(${s.id})">🗑️</button>
                    `;
                    list.appendChild(item);
                });
            } else if (stops.length === 0) {
                container.style.display = 'none';
            }
        }

        // --- KARTA & PINNAR ---
        function placePin(lngLat) {
            if (isNavigating) return;
            const marker = new maplibregl.Marker({ color: "#ff5555" }).setLngLat(lngLat).addTo(map);
            stops.push({ id: Date.now(), marker, lngLat, name: `Stopp ${stops.length + 1}` });
            updateUI();
        }

        map.on('mousedown', (e) => pressTimer = setTimeout(() => placePin(e.lngLat), 800));
        map.on('mouseup', () => clearTimeout(pressTimer));
        map.on('touchstart', (e) => pressTimer = setTimeout(() => placePin(e.lngLat), 800));
        map.on('touchend', () => clearTimeout(pressTimer));

        // --- NAVIGATION ---
        async function startNavigation() {
            if (!userCoords) return alert("Väntar på GPS... Se till att platstjänster är på.");
            if (stops.length === 0) return alert("Markera ett stopp på kartan först!");

            const coords = [userCoords, ...stops.map(s => [s.lngLat.lng, s.lngLat.lat])].map(c => c.join(',')).join(';');
            const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&steps=true&language=sv`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.code !== 'Ok') throw new Error();

                routeSteps = [];
                data.routes[0].legs.forEach(leg => routeSteps = routeSteps.concat(leg.steps));
                currentStepIndex = 0;
                lastSpokenDistance = Infinity;
                isNavigating = true;

                document.getElementById('stop-list-container').style.display = 'none';
                document.getElementById('nav-panel').style.display = 'block';

                if (map.getSource('route')) map.removeSource('route');
                map.addSource('route', { type: 'geojson', data: data.routes[0].geometry });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#7582ff', 'line-width': 6 } });

                updateNavigation();
            } catch (e) {
                alert("Kunde inte skapa rutt. Kontrollera internetanslutningen.");
            }
        }

        function updateNavigation() {
            if (!isNavigating || !routeSteps[currentStepIndex]) return;

            const step = routeSteps[currentStepIndex];
            const dist = getDist(userCoords[1], userCoords[0], step.maneuver.location[1], step.maneuver.location[0]);

            document.getElementById('instruction-text').innerText = step.maneuver.instruction;
            document.getElementById('turn-dist').innerText = dist > 1000 ? `Om ${(dist/1000).toFixed(1)} km` : `Om ${Math.round(dist)} m`;

            // Röstvarningar
            if (dist <= 3000 && lastSpokenDistance > 3000) { speak("Om tre kilometer, " + step.maneuver.instruction); lastSpokenDistance = 3000; }
            if (dist <= 300 && lastSpokenDistance > 300) { speak("Om trehundra meter, " + step.maneuver.instruction); lastSpokenDistance = 300; }
            if (dist <= 30 && lastSpokenDistance > 30) { speak(step.maneuver.instruction); lastSpokenDistance = 30; }

            if (dist < 15) {
                currentStepIndex++;
                lastSpokenDistance = Infinity;
                if (currentStepIndex >= routeSteps.length) {
                    speak("Du är framme!");
                    setTimeout(stopNavigation, 5000);
                } else {
                    updateNavigation();
                }
            }
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function stopNavigation() {
            isNavigating = false;
            document.getElementById('nav-panel').style.display = 'none';
            if (map.getLayer('route-line')) map.removeLayer('route-line');
            if (map.getSource('route')) map.removeSource('route');
            updateUI();
        }

        function clearAll() {
            stops.forEach(s => s.marker.remove());
            stops = [];
            stopNavigation();
        }

        // --- GPS ---
        const myEl = document.createElement('div');
        myEl.innerHTML = `<svg width="30" height="30" viewBox="0 0 100 100"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="black" stroke-width="5"/></svg>`;
        
        navigator.geolocation.watchPosition(pos => {
            userCoords = [pos.coords.longitude, pos.coords.latitude];
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: myEl }).setLngLat(userCoords).addTo(map);
                map.setCenter(userCoords); map.setZoom(16);
            } else userMarker.setLngLat(userCoords);
            if (followUser) map.easeTo({ center: userCoords });
            if (isNavigating) updateNavigation();
        }, null, { enableHighAccuracy: true });

        function toggleLock() { followUser = !followUser; document.getElementById('lockBtn').innerText = followUser ? "🔒" : "🔓"; }
        map.on('dragstart', () => { if (followUser) toggleLock(); });
    </script>
</body>
</html>
