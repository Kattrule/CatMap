<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellit Glob V13</title>
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #map { height: 100%; width: 100%; position: absolute; }

        /* KOORDINATRUTAN */
        .maplibregl-popup-content {
            background: rgba(10, 10, 25, 0.9) !important; color: white;
            border: 1px solid #7582ff; border-radius: 10px !important;
            padding: 15px !important; text-align: center;
        }
        .nav-btn {
            background: #7582ff; color: white; border: none; padding: 10px;
            border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }

        /* SVÄNG-PILAR */
        .turn-arrow {
            width: 24px; height: 24px;
            transition: transform 0.1s linear;
        }

        /* VERKTYG */
        .map-tools { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .tool-btn {
            width: 60px; height: 60px; background: rgba(10,10,25,0.8);
            border: 2px solid #7582ff; border-radius: 50%; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="map-tools"><div class="tool-btn" id="lockBtn" onclick="toggleLock()">🔒</div></div>

    <script>
        let followUser = true, userMarker = null, userCoords = null;
        let pinMarkers = [], turnMarkers = [], pressTimer = null;

        // Starta kartan direkt med Google Satellit
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: { 'google-sat': { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'], tileSize: 256 } },
                layers: [{ id: 'sat-layer', type: 'raster', source: 'google-sat' }]
            },
            center: [15.0, 62.0], zoom: 4
        });

        // --- SKALA PILAR ---
        map.on('zoom', () => {
            const scale = Math.max(0.2, Math.min(1.2, (map.getZoom() - 5) / 10));
            turnMarkers.forEach(m => {
                m.getElement().style.transform = `scale(${scale})`;
            });
        });

        // --- NAVIGATION ---
        async function getDirections(dest) {
            if (!userCoords) return;
            const url = `https://router.project-osrm.org/route/v1/driving/${userCoords[0]},${userCoords[1]};${dest[0]},${dest[1]}?overview=full&geometries=geojson&steps=true`;
            const res = await fetch(url);
            const data = await res.json();
            const route = data.routes[0];

            // Rensa gamla pilar
            turnMarkers.forEach(m => m.remove()); turnMarkers = [];

            // Rita linjen
            if (map.getSource('route')) { map.getSource('route').setData(route.geometry); } 
            else {
                map.addSource('route', { type: 'geojson', data: route.geometry });
                map.addLayer({ id: 'route-line', type: 'line', source: 'route', 
                    paint: { 'line-color': '#7582ff', 'line-width': 5, 'line-opacity': 0.8 } 
                });
            }

            // Lägg till nya pilar
            route.legs[0].steps.forEach((step, i, steps) => {
                if (i < steps.length - 1) {
                    const el = document.createElement('div');
                    el.className = 'turn-arrow';
                    const angle = getAngle(step.maneuver.location, steps[i+1].maneuver.location);
                    el.innerHTML = `<svg viewBox="0 0 100 100" style="transform: rotate(${angle}deg)"><path d="M50 5 L90 85 L50 65 L10 85 Z" fill="#8be9fd" stroke="white" stroke-width="5"/></svg>`;
                    const m = new maplibregl.Marker({ element: el }).setLngLat(step.maneuver.location).addTo(map);
                    turnMarkers.push(m);
                }
            });
            if (followUser) toggleLock();
        }

        // --- PLACERA NÅL ---
        function placePin(lngLat) {
            pinMarkers.forEach(p => p.remove());
            const html = `
                <div style="font-size:14px;">
                    <b style="color:#f1fa8c;">POSITION</b><br>
                    <span style="font-family:monospace;">${lngLat.lat.toFixed(5)}, ${lngLat.lng.toFixed(5)}</span><br>
                    <button class="nav-btn" onclick="getDirections([${lngLat.lng}, ${lngLat.lat}])">NAVIGERA</button>
                </div>`;
            const m = new maplibregl.Marker({ color: "#ff5555" }).setLngLat(lngLat).setPopup(new maplibregl.Popup().setHTML(html)).addTo(map);
            m.togglePopup();
            pinMarkers = [m];
        }

        // --- TOUCH & KLICK ---
        map.on('touchstart', (e) => {
            if (e.points.length === 1) {
                pressTimer = setTimeout(() => placePin(e.lngLat), 800);
            }
        });
        map.on('touchend', () => clearTimeout(pressTimer));
        map.on('mousedown', (e) => { pressTimer = setTimeout(() => placePin(e.lngLat), 800); });
        map.on('mouseup', () => clearTimeout(pressTimer));
        
        // Stäng av auto-följ när man drar
        map.on('dragstart', () => { if (followUser) toggleLock(); });

        // --- GPS ---
        const myEl = document.createElement('div');
        myEl.innerHTML = `<svg width="30" height="30" viewBox="0 0 100 100" id="me"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="black" stroke-width="5"/></svg>`;
        
        navigator.geolocation.watchPosition(pos => {
            userCoords = [pos.coords.longitude, pos.coords.latitude];
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: myEl }).setLngLat(userCoords).addTo(map);
                map.setCenter(userCoords); map.setZoom(15);
            } else { userMarker.setLngLat(userCoords); }
            document.getElementById('me').style.transform = `rotate(${pos.coords.heading || 0}deg)`;
            if (followUser) map.easeTo({ center: userCoords });
        }, null, { enableHighAccuracy: true });

        function toggleLock() { followUser = !followUser; document.getElementById('lockBtn').innerText = followUser ? "🔒" : "🔓"; }
        function getAngle(s, e) { return (Math.atan2(e[0]-s[0], e[1]-s[1]) * 180 / Math.PI + 360) % 360; }
    </script>
</body>
</html>
