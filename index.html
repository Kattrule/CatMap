<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellit Glob Pro - Sök Fix V9</title>
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        :root {
            --indigo: #7582ff;
            --purple: #bd93f9;
            --cyan: #8be9fd;
            --yellow: #f1fa8c;
            --bg-glass: rgba(15, 15, 30, 0.9);
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100%; width: 100%; position: absolute; background: #000; }

        /* SÖKRUTA */
        #search-container {
            position: absolute; top: 15px; left: 15px; right: 15px;
            z-index: 3000; display: flex; flex-direction: column;
        }
        .search-wrapper {
            position: relative; display: flex; align-items: center;
        }
        #search-input {
            width: 100%; padding: 12px 45px 12px 15px; border-radius: 12px;
            border: 1px solid var(--indigo); background: var(--bg-glass);
            color: white; font-size: 1rem; outline: none;
            backdrop-filter: blur(10px); box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #clear-search {
            position: absolute; right: 15px; color: #aaa; cursor: pointer;
            font-size: 1.2rem; font-weight: bold; display: none;
        }
        #search-results {
            background: var(--bg-glass); border-radius: 12px; margin-top: 5px;
            max-height: 250px; overflow-y: auto; display: none;
            border: 1px solid var(--indigo); backdrop-filter: blur(10px);
        }
        .result-item {
            padding: 12px; color: white; border-bottom: 1px solid rgba(117, 130, 255, 0.2);
            font-size: 0.9rem; cursor: pointer;
        }
        .result-item:active { background: var(--indigo); }

        /* ÖVRIGT */
        .maplibregl-popup-content {
            background: var(--bg-glass) !important; backdrop-filter: blur(10px);
            border: 1px solid var(--indigo); border-radius: 12px !important;
            padding: 12px !important; color: white;
        }
        .nav-btn {
            margin-top: 10px; width: 100%; background: var(--indigo);
            color: white; border: none; padding: 10px; border-radius: 6px;
            font-weight: bold; cursor: pointer;
        }
        #routeInfo {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--bg-glass); padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--indigo); color: white; display: none; z-index: 2000;
        }
        .v9-arrow-container { width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; }
        .v9-rotate-layer { transition: transform 0.2s ease-out; display: flex; justify-content: center; align-items: center; }
        .turn-arrow-icon { width: 24px; height: 24px; filter: drop-shadow(0 0 4px var(--cyan)); }
        .map-tools { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .tool-btn {
            width: 60px; height: 60px; background: var(--bg-glass);
            border: 2px solid var(--indigo); border-radius: 50%; color: white;
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Sök plats eller adress..." autocomplete="off">
            <div id="clear-search">&times;</div>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="map"></div>
    <div id="routeInfo"></div>
    <div class="map-tools"><div class="tool-btn" id="lockBtn" onclick="toggleLock()">🔒</div></div>

    <script>
        let followUser = true, userMarker = null, userCoords = null;
        let pinMarkers = [], turnMarkers = [], pressTimer = null, isMoving = false;

        // Initiera karta
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: { 's-tiles': { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'], tileSize: 256 } },
                layers: [{ id: 's-layer', type: 'raster', source: 's-tiles' }]
            },
            center: [15.0, 62.0], zoom: 4, projection: 'globe'
        });

        // --- SÖKFUNKTION ---
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        const clearBtn = document.getElementById('clear-search');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            clearBtn.style.display = query.length > 0 ? 'block' : 'none';
            if (query.length < 3) { searchResults.style.display = 'none'; return; }

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const data = await res.json();
                searchResults.innerHTML = '';
                if (data.length > 0) {
                    searchResults.style.display = 'block';
                    data.forEach(place => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerText = place.display_name;
                        div.onclick = () => {
                            const lngLat = { lng: parseFloat(place.lon), lat: parseFloat(place.lat) };
                            map.flyTo({ center: lngLat, zoom: 14 });
                            placePin(lngLat);
                            searchResults.style.display = 'none';
                            searchInput.value = place.display_name;
                        };
                        searchResults.appendChild(div);
                    });
                }
            } catch (err) { console.log("Sökfel:", err); }
        });

        clearBtn.onclick = () => {
            searchInput.value = '';
            searchResults.style.display = 'none';
            clearBtn.style.display = 'none';
        };

        // --- NAVIGERING & RUTT ---
        function getBearing(start, end) {
            const startLat = start[1] * Math.PI / 180, startLng = start[0] * Math.PI / 180;
            const endLat = end[1] * Math.PI / 180, endLng = end[0] * Math.PI / 180;
            const y = Math.sin(endLng - startLng) * Math.cos(endLat);
            const x = Math.cos(startLat) * Math.sin(endLat) - Math.sin(startLat) * Math.cos(endLat) * Math.cos(endLng - startLng);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        async function getDirections(dest) {
            if (!userCoords) return alert("Väntar på GPS...");
            const url = `https://router.project-osrm.org/route/v1/driving/${userCoords[0]},${userCoords[1]};${dest[0]},${dest[1]}?overview=full&geometries=geojson&steps=true`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const routeData = data.routes[0];
                turnMarkers.forEach(m => m.remove()); turnMarkers = [];

                if (map.getSource('route')) { map.getSource('route').setData(routeData.geometry); } 
                else {
                    map.addSource('route', { type: 'geojson', data: routeData.geometry });
                    map.addLayer({ id: 'route-casing', type: 'line', source: 'route', paint: { 'line-color': '#2c2c3e', 'line-width': 9 } });
                    map.addLayer({ id: 'route', type: 'line', source: 'route', paint: { 'line-color': '#7582ff', 'line-width': 5 } });
                }

                routeData.legs[0].steps.forEach((step, i, steps) => {
                    if (i < steps.length - 1) {
                        const el = document.createElement('div'); el.className = 'turn-arrow-icon';
                        const bearing = getBearing(step.maneuver.location, steps[i+1].maneuver.location);
                        el.innerHTML = `<svg width="24" height="24" viewBox="0 0 100 100" style="transform: rotate(${bearing}deg)"><path d="M50 5 L90 80 L50 60 L10 80 Z" fill="#8be9fd" stroke="#fff" stroke-width="5"/></svg>`;
                        const m = new maplibregl.Marker({ element: el }).setLngLat(step.maneuver.location).addTo(map);
                        turnMarkers.push(m);
                    }
                });
                document.getElementById('routeInfo').innerHTML = `Rutt: <b>${(routeData.distance / 1000).toFixed(1)} km</b>`;
                document.getElementById('routeInfo').style.display = 'block';
                if (followUser) toggleLock(); 
            } catch (e) { console.log(e); }
        }

        function placePin(lngLat) {
            if (isMoving) return;
            pinMarkers.forEach(p => p.remove()); pinMarkers = [];
            const html = `<div style="text-align:center;"><span style="color:var(--yellow); font-size:0.7rem;">POSITION</span><br><code style="color:var(--cyan); font-size:0.8rem;">${lngLat.lat.toFixed(5)}, ${lngLat.lng.toFixed(5)}</code><button class="nav-btn" onclick="getDirections([${lngLat.lng}, ${lngLat.lat}])">NAVIGERA HIT</button></div>`;
            const popup = new maplibregl.Popup({ offset: 25 }).setHTML(html);
            const newPin = new maplibregl.Marker({ color: "#ff5555" }).setLngLat(lngLat).setPopup(popup).addTo(map);
            newPin.togglePopup(); pinMarkers.push(newPin);
        }

        // --- HÄNDELSER ---
        const cancelPin = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
        map.on('movestart', () => { isMoving = true; cancelPin(); searchResults.style.display = 'none'; });
        map.on('moveend', () => { isMoving = false; });
        map.on('mousedown', (e) => { isMoving = false; cancelPin(); pressTimer = setTimeout(() => { if (!isMoving) placePin(e.lngLat); }, 800); });
        map.on('mouseup', cancelPin);
        map.on('touchstart', (e) => { if (e.touches && e.touches.length > 1) { isMoving = true; cancelPin(); return; } isMoving = false; cancelPin(); pressTimer = setTimeout(() => { if (!isMoving) placePin(e.lngLat); }, 800); });
        map.on('touchend', cancelPin);
        map.on('dblclick', () => {
            pinMarkers.forEach(p => p.remove()); turnMarkers.forEach(m => m.remove());
            pinMarkers = []; turnMarkers = [];
            if (map.getLayer('route')) { map.removeLayer('route'); map.removeLayer('route-casing'); map.removeSource('route'); }
            document.getElementById('routeInfo').style.display = 'none';
        });

        // --- POSITION ---
        const v9Container = document.createElement('div'); v9Container.className = 'v9-arrow-container';
        const v9Rotate = document.createElement('div'); v9Rotate.className = 'v9-rotate-layer';
        v9Rotate.innerHTML = `<svg width="28" height="28" viewBox="0 0 100 100"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="#4b0082" stroke-width="8"/></svg>`;
        v9Container.appendChild(v9Rotate);

        function updatePos(pos) {
            userCoords = [pos.coords.longitude, pos.coords.latitude];
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: v9Container, anchor: 'center' }).setLngLat(userCoords).addTo(map);
                map.setZoom(15);
            } else { userMarker.setLngLat(userCoords); }
            v9Rotate.style.transform = `rotate(${pos.coords.heading || 0}deg)`;
            if (followUser) map.easeTo({ center: userCoords });
        }
        function toggleLock() { followUser = !followUser; document.getElementById('lockBtn').innerText = followUser ? "🔒" : "🔓"; }
        navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        map.on('dragstart', () => { if (followUser) toggleLock(); });
    </script>
</body>
</html>
