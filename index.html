<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satellit Glob Pro - Pil-Nav</title>
    
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        :root {
            --indigo: #7582ff;
            --purple: #bd93f9;
            --cyan: #8be9fd;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #map { height: 100%; width: 100%; position: absolute; }

        /* DIN POSITION */
        .v6-arrow-container {
            width: 28px !important; height: 28px !important;
            display: flex !important; justify-content: center; align-items: center;
        }
        .v6-rotate-layer {
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s ease-out;
        }

        /* SVÄNG-PILAR */
        .turn-arrow-icon {
            width: 24px; height: 24px;
            filter: drop-shadow(0 0 4px var(--cyan));
            display: flex; justify-content: center; align-items: center;
        }

        .maplibregl-popup-content {
            background: rgba(15, 15, 30, 0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid var(--indigo);
            border-radius: 12px !important; padding: 12px !important; color: white;
        }

        #routeInfo {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.9); padding: 10px 20px;
            border-radius: 20px; border: 1px solid var(--indigo);
            color: white; display: none; z-index: 2000; font-family: sans-serif;
        }

        .map-tools { position: absolute; bottom: 30px; right: 20px; z-index: 1000; }
        .tool-btn {
            width: 65px; height: 65px; background: rgba(10, 10, 30, 0.9);
            border: 2px solid var(--indigo); border-radius: 50%; color: white;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.6rem;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="routeInfo"></div>
    <div class="map-tools"><div class="tool-btn" id="lockBtn" onclick="toggleLock()">🔒</div></div>

    <script>
        let followUser = true;
        let userMarker = null, userCoords = null;
        let pinMarkers = [], turnMarkers = [];
        let pressTimer = null, isMoving = false;

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    's-tiles': { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'], tileSize: 256 }
                },
                layers: [{ id: 's-layer', type: 'raster', source: 's-tiles' }]
            },
            center: [15.0, 62.0], zoom: 3, projection: 'globe', doubleClickZoom: false
        });

        // Funktion för att beräkna vinkel mellan två koordinater
        function getBearing(start, end) {
            const startLat = start[1] * Math.PI / 180;
            const startLng = start[0] * Math.PI / 180;
            const endLat = end[1] * Math.PI / 180;
            const endLng = end[0] * Math.PI / 180;
            const y = Math.sin(endLng - startLng) * Math.cos(endLat);
            const x = Math.cos(startLat) * Math.sin(endLat) - Math.sin(startLat) * Math.cos(endLat) * Math.cos(endLng - startLng);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        async function getDirections(dest) {
            if (!userCoords) return alert("Väntar på GPS...");
            const url = `https://router.project-osrm.org/route/v1/driving/${userCoords[0]},${userCoords[1]};${dest[0]},${dest[1]}?overview=full&geometries=geojson&steps=true`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const routeData = data.routes[0];
                
                turnMarkers.forEach(m => m.remove());
                turnMarkers = [];

                if (map.getSource('route')) {
                    map.getSource('route').setData(routeData.geometry);
                } else {
                    map.addSource('route', { type: 'geojson', data: routeData.geometry });
                    map.addLayer({ id: 'route-casing', type: 'line', source: 'route', paint: { 'line-color': '#000', 'line-width': 9 } });
                    map.addLayer({ id: 'route', type: 'line', source: 'route', paint: { 'line-color': '#7582ff', 'line-width': 5 } });
                }

                // Skapa pilar för varje steg
                routeData.legs[0].steps.forEach((step, i, steps) => {
                    if (i < steps.length - 1) {
                        const el = document.createElement('div');
                        el.className = 'turn-arrow-icon';
                        
                        // Beräkna vinkeln till nästa steg så pilen pekar rätt
                        const bearing = getBearing(step.maneuver.location, steps[i+1].maneuver.location);
                        
                        el.innerHTML = `
                            <svg width="24" height="24" viewBox="0 0 100 100" style="transform: rotate(${bearing}deg)">
                                <path d="M50 5 L90 80 L50 60 L10 80 Z" fill="#8be9fd" stroke="#fff" stroke-width="5"/>
                            </svg>
                        `;
                        
                        const m = new maplibregl.Marker({ element: el })
                            .setLngLat(step.maneuver.location)
                            .addTo(map);
                        turnMarkers.push(m);
                    }
                });

                document.getElementById('routeInfo').innerHTML = `Rutt: <b>${(routeData.distance / 1000).toFixed(1)} km</b>`;
                document.getElementById('routeInfo').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        // --- Logik för nålar ---
        function placePin(lngLat) {
            if (isMoving) return;
            if (pinMarkers.length >= 5) { pinMarkers.shift().remove(); }
            const popup = new maplibregl.Popup({ offset: 25 }).setHTML(`<div style="text-align:center;"><button style="background:var(--indigo);color:white;border:none;padding:8px;border-radius:4px;" onclick="getDirections([${lngLat.lng}, ${lngLat.lat}])">NAVIGERA</button></div>`);
            const newPin = new maplibregl.Marker({ color: "#ff5555" }).setLngLat(lngLat).setPopup(popup).addTo(map);
            newPin.togglePopup();
            pinMarkers.push(newPin);
        }

        const cancelPin = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
        map.on('movestart', () => { isMoving = true; cancelPin(); });
        map.on('moveend', () => { isMoving = false; });
        map.on('mousedown', (e) => { isMoving = false; cancelPin(); pressTimer = setTimeout(() => { if (!isMoving) placePin(e.lngLat); }, 800); });
        map.on('mouseup', cancelPin);
        map.on('touchstart', (e) => { if (e.points && e.points.length > 1) { isMoving = true; cancelPin(); return; } isMoving = false; cancelPin(); pressTimer = setTimeout(() => { if (!isMoving) placePin(e.lngLat); }, 800); });
        map.on('touchend', cancelPin);
        map.on('dblclick', () => {
            pinMarkers.forEach(p => p.remove()); turnMarkers.forEach(m => m.remove());
            pinMarkers = []; turnMarkers = [];
            if (map.getLayer('route')) { map.removeLayer('route'); map.removeLayer('route-casing'); map.removeSource('route'); }
            document.getElementById('routeInfo').style.display = 'none';
        });

        // --- Din position ---
        const v6Container = document.createElement('div');
        v6Container.className = 'v6-arrow-container';
        const v6Rotate = document.createElement('div');
        v6Rotate.className = 'v6-rotate-layer';
        v6Rotate.innerHTML = `<svg width="28" height="28" viewBox="0 0 100 100"><path d="M50 5 L90 95 L50 75 L10 95 Z" fill="#bd93f9" stroke="#4b0082" stroke-width="8"/></svg>`;
        v6Container.appendChild(v6Rotate);

        function updatePos(pos) {
            userCoords = [pos.coords.longitude, pos.coords.latitude];
            if (!userMarker) {
                userMarker = new maplibregl.Marker({ element: v6Container, anchor: 'center' }).setLngLat(userCoords).addTo(map);
                map.setZoom(15);
            } else { userMarker.setLngLat(userCoords); }
            v6Rotate.style.transform = `rotate(${pos.coords.heading || 0}deg)`;
            if (followUser) map.easeTo({ center: userCoords });
        }
        function toggleLock() { followUser = !followUser; document.getElementById('lockBtn').innerText = followUser ? "🔒" : "🔓"; }
        navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        map.on('dragstart', () => { if (followUser) toggleLock(); });
    </script>
</body>
</html>
